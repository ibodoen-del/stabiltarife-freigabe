<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>StabilTarife Vollmacht</title>

<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>

<style>

body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
text-align:center;
color:green;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
}

canvas{
border:2px solid #ccc;
border-radius:10px;
width:100%;
height:200px;
}

button{
padding:14px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
width:100%;
margin-top:10px;
}

.send{
background:green;
color:white;
}

.clear{
background:red;
color:white;
}

</style>
</head>

<body>

<div class="container">

<h1>StabilTarife Vollmacht</h1>

<input id="vorname" placeholder="Vorname *">
<input id="nachname" placeholder="Nachname *">
<input id="strasse" placeholder="Straße & Hausnummer *">
<input id="plz" placeholder="PLZ *">
<input id="stadt" placeholder="Stadt *">

<input id="geburtsdatum" type="date">

<input id="email" type="email" placeholder="E-Mail-Adresse *">

<p>
Hiermit berechtige ich StabilTarife bzw. Ibrahim Doenmez, in meinem Namen Energie- und Versicherungsangebote einzuholen, Tarifvergleiche durchzuführen und abzuschließen sowie mit Energieversorgern und Versicherungen zu kommunizieren.
</p>

<h3>Unterschrift</h3>

<canvas id="signature-pad"></canvas>

<button class="clear" onclick="clearSignature()">
Unterschrift löschen
</button>

<button class="send" onclick="sendForm()">
Jetzt unterschreiben & senden
</button>

</div>

<script>

const canvas = document.getElementById("signature-pad");

canvas.width = canvas.offsetWidth;
canvas.height = 200;

const signaturePad = new SignaturePad(canvas);

function clearSignature(){
signaturePad.clear();
}

async function sendForm(){

if(signaturePad.isEmpty()){
alert("Bitte unterschreiben");
return;
}

const data = {
vorname: document.getElementById("vorname").value,
nachname: document.getElementById("nachname").value,
strasse: document.getElementById("strasse").value,
plz: document.getElementById("plz").value,
stadt: document.getElementById("stadt").value,
geburtsdatum: document.getElementById("geburtsdatum").value,
email: document.getElementById("email").value,
unterschrift: signaturePad.toDataURL()
};

const response = await fetch("/api/send",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(data)
});

const result = await response.json();

if(result.success){
alert("PDF erfolgreich versendet!");
}else{
alert("Fehler beim Versand");
}

}

</script>

</body>
</html>
